version: '3.8'

services:
  backend:
    build: .
    image: hms_backend_alt
    container_name: hms_backend_alt_container
    ports:
      - "8080:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/hms_db
      - JWT_SECRET=change_this_to_a_secure_secret_in_production_at_least_32_chars
      - COOKIE_SECURE=False
    restart: always
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: hms_postgres_alt
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hms_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_alt:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: hms_pgadmin_alt
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    depends_on:
      - db

volumes:
  postgres_data_alt:
